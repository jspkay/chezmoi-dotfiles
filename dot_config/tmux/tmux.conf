set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",*:Tc"

run-shell ~/build/tmux-resurrect/resurrect.tmux

set -s escape-time 0

bind -n M-h select-pane -L 
# ### These are for colemak
 bind -n M-i select-pane -R 
 bind -n M-e select-pane -U 
 bind -n M-n select-pane -D 
# ### These are for qwerty
# bind -n M-l select-pane -R 
# bind -n M-k select-pane -U 
# bind -n M-j select-pane -D 

set -g mouse on 

set-option -g allow-rename off

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# session start at index 1 (like in sway)
set -g base-index 1
# panes same 
setw -g pane-base-index 1


# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour white

# copy mode
setw -g mode-style 'fg=black bg=yellow bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=black'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=white'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=yellow'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=white bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=white bg=black bold'
